name: Build

on:
  push:
    branches: [main, v0]
  pull_request:
    branches: [main, v0]

jobs:
  build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f dist/index.js
          node --check dist/index.js
          echo "Build OK ? dist/index.js ($(wc -c < dist/index.js) bytes)"
