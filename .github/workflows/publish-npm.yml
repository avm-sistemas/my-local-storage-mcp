name: Publish npm

# Auth: NPM_TOKEN (granular, bypass 2FA). Provenance disabled until Trusted Publisher is configured on npmjs.com.
# Do not "Re-run" a failed release job ? trigger a fresh run via Actions -> Run workflow (main).

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: |
          npm install -g npm@11
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          npm run build -w my-local-storage-mcp-graphify

      - name: Verify package
        run: |
          test -f dist/index.js
          test -f packages/plugin-graphify/dist/index.js
          node --check dist/index.js
          node --check packages/plugin-graphify/dist/index.js
          npm pack --dry-run
          npm pack --dry-run -w my-local-storage-mcp-graphify

      - name: Check NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::GitHub secret NPM_TOKEN is missing. Create a granular npm token with bypass 2FA and add it to repo Settings -> Secrets."
            exit 1
          fi
          echo "NPM_TOKEN secret: present"

      - name: Publish core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          npm publish --access public || {
            code=$?
            ver=$(node -p "require('./package.json').version")
            if npm view "my-local-storage-mcp@${ver}" version >/dev/null 2>&1; then
              echo "Core ${ver} already on npm, skipping."
              exit 0
            fi
            exit $code
          }

      - name: Publish Graphify add-on
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: npm publish --access public -w my-local-storage-mcp-graphify
