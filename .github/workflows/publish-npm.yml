name: Publish npm

# Auth: granular access token with "bypass 2FA for automation" in GitHub secret NPM_TOKEN.
# Trusted Publisher (OIDC) can replace this later; npm does not validate TP config until publish.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Upgrade npm
        run: |
          npm install -g npm@11
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: |
          test -f dist/index.js
          node --check dist/index.js
          npm pack --dry-run

      - name: Check NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::GitHub secret NPM_TOKEN is missing. Create a granular npm token with bypass 2FA and add it to repo Settings -> Secrets."
            exit 1
          fi
          echo "NPM_TOKEN secret: present"

      - name: Configure npm registry for publish
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
