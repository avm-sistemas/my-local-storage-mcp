name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: |
          test -f dist/index.js
          node --check dist/index.js
          npm pack --dry-run

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@11
          node --version
          npm --version
          if [ -f .npmrc ]; then echo "::warning::Removing project .npmrc (blocks OIDC)"; rm -f .npmrc; fi
          if [ -f "$HOME/.npmrc" ]; then echo "::warning::Removing runner .npmrc (blocks OIDC)"; rm -f "$HOME/.npmrc"; fi

      - name: Publish
        run: npm publish --provenance --access public
